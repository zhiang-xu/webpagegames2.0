<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 2048 - 张七七的游戏乐园</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Comic Neue', 'Noto Sans SC', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .floating-decorations {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .floating-item {
            position: absolute;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
            opacity: 0.3;
        }
        .floating-item:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .floating-item:nth-child(2) { top: 20%; right: 10%; animation-delay: 1s; }
        .floating-item:nth-child(3) { bottom: 30%; left: 15%; animation-delay: 2s; }
        .floating-item:nth-child(4) { bottom: 15%; right: 5%; animation-delay: 3s; }
        .floating-item:nth-child(5) { top: 50%; left: 85%; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        header {
            text-align: center;
            padding: 20px 20px 10px;
            position: relative;
            z-index: 1;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 3px 3px 0 #ff6b6b, 6px 6px 0 #4ecdc4;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.85);
            margin-top: 5px;
        }

        .rules-box {
            position: relative;
            z-index: 1;
            width: min(100%, 760px);
            margin: 0 20px 18px;
            padding: 16px 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.94);
            border: 2px dashed rgba(78,205,196,0.55);
            box-shadow: 0 10px 28px rgba(0,0,0,0.18);
            text-align: left;
        }
        .rules-box h2 {
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #2f6f55;
        }
        .rules-box ul {
            margin: 0;
            padding-left: 1.2rem;
            color: #4c4c4c;
            line-height: 1.7;
        }
        .rules-box li + li {
            margin-top: 6px;
        }

        .game-area {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        .info-bar {
            display: flex;
            gap: 15px;
        }

        .info-box {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 12px 20px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        .info-box h3 {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 3px;
        }
        .info-box .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
        }
        .info-box .value.score { color: #ff6b6b; }
        .info-box .value.best { color: #4ecdc4; }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
        }
        .btn-new {
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
            color: white;
        }
        .btn-new:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.5);
        }

        /* 游戏棋盘 */
        .game-board {
            position: relative;
            background: #bbada0;
            border-radius: 15px;
            padding: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 68px);
            grid-template-rows: repeat(4, 68px);
            gap: 12px;
        }

        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #776e65;
            position: relative;
            width: 68px;
            height: 68px;
        }

        .tile {
            width: 68px;
            height: 68px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-family: 'Comic Neue', 'Noto Sans SC', sans-serif;
            animation: pop 0.2s ease-out;
            z-index: 10;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes slide {
            from { opacity: 0; transform: translate(0, 20px); }
            to { opacity: 1; transform: translate(0, 0); }
        }

        @keyframes merge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .tile-new { animation: slide 0.3s ease-out; }
        .tile-merged { animation: merge 0.2s ease-out; }

        /* 不同数字的颜色 */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.6rem; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.6rem; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.6rem; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.3rem; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.3rem; box-shadow: 0 0 30px #ffd700; }

        /* 游戏结束遮罩 */
        .game-over-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 20;
        }
        .game-over-overlay.show { display: flex; }
        .game-over-overlay h2 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 15px;
        }
        .game-over-overlay .final-score {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 25px;
        }
        .game-over-overlay .btn-restart {
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
            color: white;
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
            transition: all 0.3s;
        }
        .game-over-overlay .btn-restart:hover { transform: scale(1.05); }

        /* 胜利遮罩 */
        .victory-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(243, 215, 11, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 20;
        }
        .victory-overlay.show { display: flex; }
        .victory-overlay h2 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }
        .victory-overlay p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .victory-overlay .btn-continue {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            background: rgba(255,255,255,0.9);
            color: #776e65;
            margin-bottom: 10px;
        }
        .victory-overlay .btn-restart {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            color: #fff;
        }

        /* 操作说明 */
        .instructions {
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 15px 25px;
            font-size: 0.85rem;
            color: #555;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }
        .instructions h4 {
            margin-bottom: 8px;
            color: #333;
        }

        /* 移动端控制 */
        .mobile-hints {
            display: none;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .mobile-hint-btn {
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.15s;
        }
        .mobile-hint-btn:active { transform: scale(0.9); }

        @media (max-width: 768px) {
            .logo { font-size: 1.8rem; }
            .grid-container { width: 280px; height: 280px; gap: 10px; }
            .tile { width: 58px; height: 58px; font-size: 1.6rem; }
            .tile-128, .tile-256, .tile-512 { font-size: 1.3rem; }
            .tile-1024, .tile-2048 { font-size: 1.1rem; }
            .info-box { padding: 10px 16px; }
            .info-box .value { font-size: 1.5rem; }
            .mobile-hints { display: flex; }
            .instructions { display: none; }
        }
    </style>
</head>
<body>
    <div class="floating-decorations">
        <span class="floating-item">🔢</span>
        <span class="floating-item">🧩</span>
        <span class="floating-item">⭐</span>
        <span class="floating-item">🌟</span>
        <span class="floating-item">💫</span>
    </div>

    <header>
        <div class="logo">🔢 2048</div>
        <p class="subtitle">张七七的游戏乐园 | 两个相同数字合并，挑战2048！</p>
    </header>

    <section class="rules-box" aria-label="游戏规则">
        <h2>玩法说明</h2>
        <ul>
            <li>用方向键或滑动，让所有数字方块一起朝同一个方向移动。</li>
            <li>两个相同数字碰到一起会合并成更大的数字。</li>
            <li>每移动一次，棋盘都会随机出现一个新数字。</li>
            <li>合成出 2048 就算达成目标；如果棋盘满了且再也不能合并，游戏结束。</li>
        </ul>
    </section>

    <div class="game-area">
        <div class="header-row">
            <div class="info-bar">
                <div class="info-box">
                    <h3>🏆 得分</h3>
                    <p class="value score" id="score">0</p>
                </div>
                <div class="info-box">
                    <h3>🥇 最高分</h3>
                    <p class="value best" id="bestScore">0</p>
                </div>
            </div>
            <button class="btn btn-new" onclick="resetGame()">🔄 新游戏</button>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="grid-container" id="gridContainer"></div>
            <div class="game-over-overlay" id="gameOver">
                <h2>💥 游戏结束!</h2>
                <p class="final-score">最终得分: <span id="finalScore">0</span></p>
                <button class="btn-restart" onclick="resetGame()">🔄 再来一局</button>
            </div>
            <div class="victory-overlay" id="victory">
                <h2>🎉 你赢了!</h2>
                <p>已经凑出了2048！太棒了！</p>
                <button class="btn-continue" onclick="continueGame()">继续挑战</button>
                <button class="btn-restart" onclick="resetGame()">🔄 新游戏</button>
            </div>
        </div>

        <div class="mobile-hints">
            <button class="mobile-hint-btn" ontouchstart="handleMobileMove('up')">⬆️</button>
            <button class="mobile-hint-btn" ontouchstart="handleMobileMove('left')">⬅️</button>
            <button class="mobile-hint-btn" ontouchstart="handleMobileMove('down')">⬇️</button>
            <button class="mobile-hint-btn" ontouchstart="handleMobileMove('right')">➡️</button>
        </div>

        <div class="instructions">
            <h4>⌨ 操作说明</h4>
            <p>使用 ⬆️⬇️️️️ 方向键滑动方块，<br>两个相同数字碰撞时会合并成更大的数字！</p>
        </div>
    </div>

    <script src="../shared/game-ui.js"></script>
    <script>
        const pageAudio = window.GamePageUI.mount({ home: true, sound: true, muted: false });
        const SIZE = 4;
        let board = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('bestScore2048') || '0');
        let gameWon = false;
        let gameOver = false;
        let tiles = []; // 存储动态方块元素

        const gridContainer = document.getElementById('gridContainer');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('bestScore');
        const gameOverOverlay = document.getElementById('gameOver');
        const victoryOverlay = document.getElementById('victory');
        const finalScoreEl = document.getElementById('finalScore');

        bestScoreEl.textContent = bestScore;

        function initGrid() {
            gridContainer.innerHTML = '';
            for (let i = 0; i < SIZE * SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                gridContainer.appendChild(cell);
            }
        }

        function initBoard() {
            board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
            score = 0;
            gameWon = false;
            gameOver = false;
            updateScore();
            gameOverOverlay.classList.remove('show');
            victoryOverlay.classList.remove('show');
            clearTiles();
            addNewTile();
            addNewTile();
            render();
        }

        function clearTiles() {
            tiles.forEach(t => t.remove());
            tiles = [];
        }

        function addNewTile() {
            const empty = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length === 0) return;
            const {r, c} = empty[Math.floor(Math.random() * empty.length)];
            board[r][c] = Math.random() < 0.9 ? 2 : 4;
            tiles.push({r, c, value: board[r][c], element: null});
        }

        function render() {
            // 清空所有tile元素
            tiles.forEach(t => t.element?.remove());
            tiles = [];

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] !== 0) {
                        const cell = gridContainer.children[r * SIZE + c];
                        const tile = document.createElement('div');
                        tile.className = 'tile tile-' + board[r][c] + ' tile-new';
                        tile.textContent = board[r][c];
                        cell.appendChild(tile);
                        tiles.push({r, c, value: board[r][c], element: tile});
                    }
                }
            }
        }

        function updateScore() {
            scoreEl.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                bestScoreEl.textContent = bestScore;
                localStorage.setItem('bestScore2048', bestScore);
            }
        }

        function slideRow(row) {
            const arr = row.filter(v => v !== 0);
            const result = [];
            let i = 0;
            while (i < arr.length) {
                if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
                    result.push(arr[i] * 2);
                    score += arr[i] * 2;
                    i += 2;
                } else {
                    result.push(arr[i]);
                    i++;
                }
            }
            while (result.length < SIZE) result.push(0);
            return result;
        }

        function moveLeft() {
            let moved = false;
            for (let r = 0; r < SIZE; r++) {
                const oldRow = board[r];
                const newRow = slideRow(oldRow);
                board[r] = newRow;
                if (oldRow.join(',') !== newRow.join(',')) moved = true;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let r = 0; r < SIZE; r++) {
                const oldRow = board[r];
                const reversed = [...oldRow].reverse();
                const newRow = slideRow(reversed).reverse();
                board[r] = newRow;
                if (oldRow.join(',') !== newRow.join(',')) moved = true;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let c = 0; c < SIZE; c++) {
                const col = board.map(r => r[c]);
                const newCol = slideRow(col);
                for (let r = 0; r < SIZE; r++) {
                    if (board[r][c] !== newCol[r]) moved = true;
                    board[r][c] = newCol[r];
                }
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let c = 0; c < SIZE; c++) {
                const col = board.map(r => r[c]).reverse();
                const newCol = slideRow(col).reverse();
                for (let r = 0; r < SIZE; r++) {
                    if (board[r][c] !== newCol[r]) moved = true;
                    board[r][c] = newCol[r];
                }
            }
            return moved;
        }

        function handleMove(direction) {
            if (gameOver) return;

            const previousScore = score;
            let moved = false;
            if (direction === 'left') moved = moveLeft();
            else if (direction === 'right') moved = moveRight();
            else if (direction === 'up') moved = moveUp();
            else if (direction === 'down') moved = moveDown();

            if (!moved) return;

            updateScore();
            addNewTile();
            render();
            pageAudio.play(score > previousScore ? 'clear' : 'move');

            // 检查是否赢了
            if (!gameWon) {
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (board[r][c] === 2048) {
                            gameWon = true;
                            victoryOverlay.classList.add('show');
                            pageAudio.play('win');
                            return;
                        }
                    }
                }
            }

            // 检查是否输了
            if (isGameOver()) {
                gameOver = true;
                finalScoreEl.textContent = score;
                gameOverOverlay.classList.add('show');
                pageAudio.play('lose');
            }
        }

        function isGameOver() {
            // 检查是否有空位
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) return false;
                }
            }
            // 检查是否有相邻相同数字
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const val = board[r][c];
                    if (c + 1 < SIZE && board[r][c + 1] === val) return false;
                    if (r + 1 < SIZE && board[r + 1][c] === val) return false;
                }
            }
            return true;
        }

        function resetGame() {
            initBoard();
            pageAudio.play('start');
        }

        function continueGame() {
            victoryOverlay.classList.remove('show');
            pageAudio.play('tap');
        }

        function handleMobileMove(dir) {
            handleMove(dir);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': e.preventDefault(); handleMove('up'); break;
                case 'ArrowDown': e.preventDefault(); handleMove('down'); break;
                case 'ArrowLeft': e.preventDefault(); handleMove('left'); break;
                case 'ArrowRight': e.preventDefault(); handleMove('right'); break;
            }
        });

        // 触摸滑动支持
        let touchStartX = 0;
        let touchStartY = 0;
        const gameBoard = document.getElementById('gameBoard');

        gameBoard.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        gameBoard.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;

            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) > 30) {
                if (absDx > absDy) {
                    handleMove(dx > 0 ? 'right' : 'left');
                } else {
                    handleMove(dy > 0 ? 'down' : 'up');
                }
            }

            touchStartX = 0;
            touchStartY = 0;
            e.preventDefault();
        }, { passive: false });

        // 初始化
        initGrid();
        initBoard();
    </script>
</body>
</html>
