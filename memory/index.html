<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🃏 记忆卡片 - 张七七的游戏乐园</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Comic Neue', 'Noto Sans SC', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .floating-decorations {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .floating-item {
            position: absolute;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
            opacity: 0.3;
        }
        .floating-item:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .floating-item:nth-child(2) { top: 20%; right: 10%; animation-delay: 1s; }
        .floating-item:nth-child(3) { bottom: 30%; left: 15%; animation-delay: 2s; }
        .floating-item:nth-child(4) { bottom: 15%; right: 5%; animation-delay: 3s; }
        .floating-item:nth-child(5) { top: 50%; left: 85%; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        header {
            text-align: center;
            padding: 20px 20px 10px;
            position: relative;
            z-index: 1;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 3px 3px 0 #ff6b6b, 6px 6px 0 #4ecdc4;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.85);
            margin-top: 5px;
        }

        .rules-box {
            position: relative;
            z-index: 1;
            width: min(100%, 760px);
            margin: 0 20px 18px;
            padding: 16px 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.94);
            border: 2px dashed rgba(78,205,196,0.55);
            box-shadow: 0 10px 28px rgba(0,0,0,0.18);
            text-align: left;
        }
        .rules-box h2 {
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #2f6f55;
        }
        .rules-box ul {
            margin: 0;
            padding-left: 1.2rem;
            color: #4c4c4c;
            line-height: 1.7;
        }
        .rules-box li + li {
            margin-top: 6px;
        }

        .game-area {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .info-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-box {
            background: rgba(255,255,255,0.95);
            border-radius: 18px;
            padding: 18px 24px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            min-width: 140px;
        }
        .info-box h3 {
            font-size: 1rem;
            color: #666;
            margin-bottom: 6px;
        }
        .info-box .value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #333;
        }
        .info-box .value.moves { color: #ff6b6b; }
        .info-box .value.time { color: #4ecdc4; }

        .btn {
            padding: 14px 36px;
            border: none;
            border-radius: 35px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 18px rgba(0,0,0,0.25);
            min-width: 180px;
        }
        .btn-restart {
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
            color: white;
        }
        .btn-restart:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.5);
        }

        .difficulty-select {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-diff {
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-diff.easy { background: linear-gradient(135deg, #4ecdc4, #44a3aa); color: white; }
        .btn-diff.medium { background: linear-gradient(135deg, #ffa751, #ffe259); color: #333; }
        .btn-diff.hard { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; }
        .btn-diff.active {
            outline: 3px solid white;
            outline-offset: 3px;
        }

        .game-grid {
            display: grid;
            gap: 12px;
            position: relative;
        }

        .card {
            width: 80px;
            height: 80px;
            perspective: 1000px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            animation: matchPulse 0.5s ease-out;
        }

        @keyframes matchPulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            backface-visibility: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card-front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 2rem;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
        }

        .card-back.emoji-1 { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
        .card-back.emoji-2 { background: linear-gradient(135deg, #a8edea, #fed6e3); }
        .card-back.emoji-3 { background: linear-gradient(135deg, #d299c2, #fef9d7); }
        .card-back.emoji-4 { background: linear-gradient(135deg, #89f7fe, #66a6ff); }
        .card-back.emoji-5 { background: linear-gradient(135deg, #fddb92, #d1fdff); }
        .card-back.emoji-6 { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .card-back.emoji-7 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
        .card-back.emoji-8 { background: linear-gradient(135deg, #ffecd2, #a8edea); }

        /* 游戏胜利遮罩 */
        .victory-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .victory-overlay.show { display: flex; }
        .victory-overlay h2 {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #333;
            animation: shine 2s infinite;
        }
        @keyframes shine {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .victory-overlay .stats {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 25px;
            text-align: center;
        }
        .victory-overlay .stats p { margin: 8px 0; }
        .victory-overlay .btn-play-again {
            padding: 18px 48px;
            border: none;
            border-radius: 35px;
            font-size: 1.4rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
            color: white;
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.5);
            transition: all 0.3s;
        }
        .victory-overlay .btn-play-again:hover {
            transform: scale(1.05);
        }

        /* 移动端 */
        @media (max-width: 768px) {
            .logo { font-size: 1.8rem; }
            .card { width: 60px; height: 60px; }
            .card-front, .card-back { font-size: 2rem; border-radius: 10px; }
            .info-box { padding: 12px 16px; min-width: 100px; }
            .info-box .value { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="floating-decorations">
        <span class="floating-item">🃏</span>
        <span class="floating-item">⭐</span>
        <span class="floating-item">🌟</span>
        <span class="floating-item">💫</span>
        <span class="floating-item">🎮</span>
    </div>

    <header>
        <div class="logo">🃏 记忆卡片</div>
        <p class="subtitle">张七七的游戏乐园 | 找到所有配对，锻炼记忆力！</p>
    </header>

    <section class="rules-box" aria-label="游戏规则">
        <h2>玩法说明</h2>
        <ul>
            <li>每次翻开两张卡片，记住它们的位置和图案。</li>
            <li>两张图案相同就会配对成功，并保持翻开状态。</li>
            <li>如果两张不同，它们会翻回去，需要继续记忆。</li>
            <li>把所有卡片全部配对完成就获胜，用时越短、步数越少越厉害。</li>
        </ul>
    </section>

    <div class="game-area">
        <div class="difficulty-select">
            <button class="btn-diff easy active" onclick="setDifficulty('easy')">简单 (4×4)</button>
            <button class="btn-diff medium" onclick="setDifficulty('medium')">中等 (4×5)</button>
            <button class="btn-diff hard" onclick="setDifficulty('hard')">困难 (4×6)</button>
        </div>

        <div class="info-bar">
            <div class="info-box">
                <h3>🔄 步数</h3>
                <p class="value moves" id="moves">0</p>
            </div>
            <div class="info-box">
                <h3>⏱ 时间</h3>
                <p class="value time" id="time">00:00</p>
            </div>
            <div class="info-box">
                <h3>🎯 配对</h3>
                <p class="value" id="pairs">0/0</p>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-restart" onclick="initGame()">🔄 重新开始</button>
        </div>

        <div class="game-grid" id="gameGrid"></div>
    </div>

    <div class="victory-overlay" id="victory">
        <h2>🎉 恭喜你赢了！</h2>
        <div class="stats">
            <p>⏱ 用时：<span id="finalTime">00:00</span></p>
            <p>🔄 步数：<span id="finalMoves">0</span></p>
            <p>⭐ 评分：<span id="finalScore">★★★</span></p>
        </div>
        <button class="btn-play-again" onclick="initGame()">🎮 再玩一次</button>
    </div>

    <script src="../shared/game-ui.js"></script>
    <script>
        const pageAudio = window.GamePageUI.mount({ home: true, sound: true, muted: false });
        const EMOJIS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔'];

        const DIFFICULTY = {
            easy:   { rows: 4, cols: 4, pairs: 8 },
            medium: { rows: 4, cols: 5, pairs: 10 },
            hard:   { rows: 4, cols: 6, pairs: 12 }
        };

        let difficulty = 'easy';
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = null;
        let seconds = 0;
        let gameStarted = false;
        let gameWon = false;

        const grid = document.getElementById('gameGrid');
        const movesEl = document.getElementById('moves');
        const timeEl = document.getElementById('time');
        const pairsEl = document.getElementById('pairs');

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
        }

        function setDifficulty(diff) {
            difficulty = diff;
            document.querySelectorAll('.btn-diff').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.btn-diff.' + diff).classList.add('active');
            initGame();
            pageAudio.play('tap');
        }

        function startTimer() {
            if (gameStarted) return;
            gameStarted = true;
            seconds = 0;
            timer = setInterval(() => {
                seconds++;
                timeEl.textContent = formatTime(seconds);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
        }

        function initGame() {
            stopTimer();
            gameStarted = false;
            gameWon = false;
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            seconds = 0;

            movesEl.textContent = '0';
            timeEl.textContent = '00:00';

            const config = DIFFICULTY[difficulty];
            pairsEl.textContent = `0/${config.pairs}`;

            // 设置网格
            grid.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;

            // 选择并复制emoji
            const selected = shuffle(EMOJIS).slice(0, config.pairs);
            const doubled = shuffle([...selected, ...selected]);

            // 创建卡片
            grid.innerHTML = '';
            doubled.forEach((emoji, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = i;
                card.dataset.emoji = emoji;

                const inner = document.createElement('div');
                inner.className = 'card-inner';

                const front = document.createElement('div');
                front.className = 'card-front';
                front.textContent = '🃏';

                const back = document.createElement('div');
                back.className = 'card-back emoji-' + ((i % 8) + 1);
                back.textContent = emoji;

                inner.appendChild(front);
                inner.appendChild(back);
                card.appendChild(inner);

                card.addEventListener('click', () => flipCard(card));
                grid.appendChild(card);
            });

            document.getElementById('victory').classList.remove('show');
            pageAudio.play('start');
        }

        function flipCard(card) {
            if (gameWon) return;
            if (flippedCards.length >= 2) return;
            if (card.classList.contains('flipped')) return;

            startTimer();

            card.classList.add('flipped');
            flippedCards.push(card);
            pageAudio.play('select');

            if (flippedCards.length === 2) {
                moves++;
                movesEl.textContent = moves;

                const [c1, c2] = flippedCards;
                if (c1.dataset.emoji === c2.dataset.emoji) {
                    // 配对成功
                    c1.classList.add('matched');
                    c2.classList.add('matched');
                    pageAudio.play('success');
                    matchedPairs++;
                    const config = DIFFICULTY[difficulty];
                    pairsEl.textContent = `${matchedPairs}/${config.pairs}`;
                    flippedCards = [];

                    if (matchedPairs === config.pairs) {
                        gameWon = true;
                        stopTimer();
                        setTimeout(() => showVictory(), 500);
                    }
                } else {
                    // 配对失败
                    pageAudio.play('error');
                    setTimeout(() => {
                        c1.classList.remove('flipped');
                        c2.classList.remove('flipped');
                        flippedCards = [];
                    }, 1000);
                }
            }
        }

        function showVictory() {
            document.getElementById('finalTime').textContent = formatTime(seconds);
            document.getElementById('finalMoves').textContent = moves;

            // 评分
            const config = DIFFICULTY[difficulty];
            const idealMoves = config.pairs;
            let stars = '★';
            if (moves <= idealMoves * 1.5) stars = '★★★';
            else if (moves <= idealMoves * 2) stars = '★★';

            document.getElementById('finalScore').textContent = stars;
            document.getElementById('victory').classList.add('show');
            pageAudio.play('win');
        }

        // 初始化
        initGame();
    </script>
</body>
</html>
