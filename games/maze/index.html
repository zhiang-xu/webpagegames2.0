<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌀 迷宫游戏 - 张七七的游戏乐园</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="floating-decorations">
        <span class="floating-item">🌀</span>
        <span class="floating-item">🎯</span>
        <span class="floating-item">⭐</span>
        <span class="floating-item">🌟</span>
        <span class="floating-item">💫</span>
    </div>

    <header>
        <div class="logo">🌀 迷宫游戏</div>
        <p class="subtitle">张七七的游戏乐园 | 找到从起点到终点的路！</p>
    </header>

    <section class="rules-box" aria-label="游戏规则">
        <h2>玩法说明</h2>
        <ul>
            <li>从起点出发，用方向键或屏幕方向按钮走到终点。</li>
            <li>墙壁不能穿过去，只能沿着通路前进。</li>
            <li>"提示"会给你下一步帮助，"看答案"会直接显示路线。</li>
            <li>走出迷宫就算胜利，用时越短、步数越少越好。</li>
        </ul>
    </section>

    <div class="game-area">
        <div class="difficulty-select">
            <button class="btn-diff easy active" onclick="newMaze('easy'); startGame()">简单 (10×10)</button>
            <button class="btn-diff medium" onclick="newMaze('medium'); startGame()">中等 (15×15)</button>
            <button class="btn-diff hard" onclick="newMaze('hard'); startGame()">困难 (20×20)</button>
        </div>

        <div class="info-bar">
            <div class="info-box">
                <h3>⏱ 时间</h3>
                <p class="value time" id="timeDisplay">00:00</p>
            </div>
            <div class="info-box">
                <h3>👣 步数</h3>
                <p class="value steps" id="stepsDisplay">0</p>
            </div>
        </div>

        <div class="maze-container">
            <canvas id="maze"></canvas>
        </div>

        <div class="mobile-controls">
            <button class="mobile-btn up" ontouchstart="movePlayer(0,-1)">⬆️</button>
            <button class="mobile-btn left" ontouchstart="movePlayer(-1,0)">⬅️</button>
            <button class="mobile-btn right" ontouchstart="movePlayer(1,0)">➡️</button>
            <button class="mobile-btn down" ontouchstart="movePlayer(0,1)">⬇️</button>
        </div>

        <div class="controls">
            <button class="btn btn-new" onclick="startGame()">🎮 开始游戏</button>
            <button class="btn btn-new" onclick="newMaze(difficulty)">🔄 新迷宫</button>
            <button class="btn btn-hint" onclick="showHint()">💡 提示</button>
            <button class="btn btn-solve" onclick="solveMaze()">🗺 看答案</button>
        </div>
    </div>

    <div class="victory-overlay" id="victory">
        <h2>🎉 恭喜你走出来了！</h2>
        <div class="stats">
            <p>⏱ 用时：<span id="finalTime">00:00</span></p>
            <p>👣 步数：<span id="finalSteps">0</span></p>
            <p>⭐ 评分：<span id="finalScore">★★★</span></p>
        </div>
        <button class="btn-play-again" onclick="newMaze(difficulty)">🎮 再来一局</button>
    </div>

    <script src="../../js/game-ui.js"></script>
    <script src="index.js"></script>
</body>
</html>
