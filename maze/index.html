<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌀 迷宫游戏 - 张七七的游戏乐园</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Comic Neue', 'Noto Sans SC', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .floating-decorations {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .floating-item {
            position: absolute;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
            opacity: 0.3;
        }
        .floating-item:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .floating-item:nth-child(2) { top: 20%; right: 10%; animation-delay: 1s; }
        .floating-item:nth-child(3) { bottom: 30%; left: 15%; animation-delay: 2s; }
        .floating-item:nth-child(4) { bottom: 15%; right: 5%; animation-delay: 3s; }
        .floating-item:nth-child(5) { top: 50%; left: 85%; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        header {
            text-align: center;
            padding: 20px 20px 10px;
            position: relative;
            z-index: 1;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 3px 3px 0 #ff6b6b, 6px 6px 0 #4ecdc4;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.85);
            margin-top: 5px;
        }

        .rules-box {
            position: relative;
            z-index: 1;
            width: min(100%, 760px);
            margin: 0 20px 18px;
            padding: 16px 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.94);
            border: 2px dashed rgba(78,205,196,0.55);
            box-shadow: 0 10px 28px rgba(0,0,0,0.18);
            text-align: left;
        }
        .rules-box h2 {
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #2f6f55;
        }
        .rules-box ul {
            margin: 0;
            padding-left: 1.2rem;
            color: #4c4c4c;
            line-height: 1.7;
        }
        .rules-box li + li {
            margin-top: 6px;
        }

        .game-area {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .info-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-box {
            background: rgba(255,255,255,0.95);
            border-radius: 18px;
            padding: 18px 24px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            min-width: 130px;
        }
        .info-box h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 4px;
        }
        .info-box .value {
            font-size: 2rem;
            font-weight: 700;
        }
        .info-box .value.time { color: #4ecdc4; }
        .info-box .value.steps { color: #ff6b6b; }

        .difficulty-select {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-diff {
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-diff.easy { background: linear-gradient(135deg, #4ecdc4, #44a3aa); color: white; }
        .btn-diff.medium { background: linear-gradient(135deg, #ffa751, #ffe259); color: #333; }
        .btn-diff.hard { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; }
        .btn-diff.active {
            outline: 3px solid white;
            outline-offset: 3px;
        }

        /* 迷宫画布 */
        .maze-container {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        canvas#maze {
            display: block;
            background: #fafafa;
        }

        /* 移动端控制 */
        .mobile-controls {
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 200px;
        }
        .mobile-btn {
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.15s;
            user-select: none;
            -webkit-user-select: none;
        }
        .mobile-btn:active { transform: scale(0.9); }
        .mobile-btn.up { grid-column: 2; }
        .mobile-btn.left { grid-column: 1; }
        .mobile-btn.right { grid-column: 3; }
        .mobile-btn.down { grid-column: 2; }

        /* 操作按钮 */
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 18px rgba(0,0,0,0.25);
        }
        .btn-new { background: linear-gradient(135deg, #4ecdc4, #44a3aa); color: white; }
        .btn-solve { background: linear-gradient(135deg, #ffa751, #ffe259); color: #333; }
        .btn-hint { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn:hover { transform: translateY(-3px); }

        /* 胜利遮罩 */
        .victory-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .victory-overlay.show { display: flex; }
        .victory-overlay h2 {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #333;
        }
        .victory-overlay .stats {
            color: #fff;
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 25px;
        }
        .victory-overlay .stats p { margin: 8px 0; }
        .victory-overlay .btn-play-again {
            padding: 18px 48px;
            border: none;
            border-radius: 35px;
            font-size: 1.4rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
            color: white;
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.5);
            transition: all 0.3s;
        }
        .victory-overlay .btn-play-again:hover { transform: scale(1.05); }

        /* 提示动画 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .hint-path .cell {
            animation: pulse 1s ease-in-out infinite;
            background: rgba(255, 215, 0, 0.5) !important;
        }

        /* 移动端 */
        @media (max-width: 768px) {
            .logo { font-size: 1.8rem; }
            .mobile-controls { display: grid; grid-template-columns: repeat(3, 1fr); }
            .info-box { padding: 12px 16px; min-width: 100px; }
            .info-box .value { font-size: 1.6rem; }
            .controls { gap: 8px; }
            .btn { padding: 12px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="floating-decorations">
        <span class="floating-item">🌀</span>
        <span class="floating-item">🎯</span>
        <span class="floating-item">⭐</span>
        <span class="floating-item">🌟</span>
        <span class="floating-item">💫</span>
    </div>

    <header>
        <div class="logo">🌀 迷宫游戏</div>
        <p class="subtitle">张七七的游戏乐园 | 找到从起点到终点的路！</p>
    </header>

    <section class="rules-box" aria-label="游戏规则">
        <h2>玩法说明</h2>
        <ul>
            <li>从起点出发，用方向键或屏幕方向按钮走到终点。</li>
            <li>墙壁不能穿过去，只能沿着通路前进。</li>
            <li>“提示”会给你下一步帮助，“看答案”会直接显示路线。</li>
            <li>走出迷宫就算胜利，用时越短、步数越少越好。</li>
        </ul>
    </section>

    <div class="game-area">
        <div class="difficulty-select">
            <button class="btn-diff easy active" onclick="newMaze('easy')">简单 (10×10)</button>
            <button class="btn-diff medium" onclick="newMaze('medium')">中等 (15×15)</button>
            <button class="btn-diff hard" onclick="newMaze('hard')">困难 (20×20)</button>
        </div>

        <div class="info-bar">
            <div class="info-box">
                <h3>⏱ 时间</h3>
                <p class="value time" id="timeDisplay">00:00</p>
            </div>
            <div class="info-box">
                <h3>👣 步数</h3>
                <p class="value steps" id="stepsDisplay">0</p>
            </div>
        </div>

        <div class="maze-container">
            <canvas id="maze"></canvas>
        </div>

        <div class="mobile-controls">
            <button class="mobile-btn up" ontouchstart="movePlayer(0,-1)">⬆️</button>
            <button class="mobile-btn left" ontouchstart="movePlayer(-1,0)">⬅️</button>
            <button class="mobile-btn right" ontouchstart="movePlayer(1,0)">➡️</button>
            <button class="mobile-btn down" ontouchstart="movePlayer(0,1)">⬇️</button>
        </div>

        <div class="controls">
            <button class="btn btn-new" onclick="newMaze(difficulty)">🔄 新迷宫</button>
            <button class="btn btn-hint" onclick="showHint()">💡 提示</button>
            <button class="btn btn-solve" onclick="solveMaze()">🗺 看答案</button>
        </div>
    </div>

    <div class="victory-overlay" id="victory">
        <h2>🎉 恭喜你走出来了！</h2>
        <div class="stats">
            <p>⏱ 用时：<span id="finalTime">00:00</span></p>
            <p>👣 步数：<span id="finalSteps">0</span></p>
            <p>⭐ 评分：<span id="finalScore">★★★</span></p>
        </div>
        <button class="btn-play-again" onclick="newMaze(difficulty)">🎮 再来一局</button>
    </div>

    <script src="../shared/game-ui.js"></script>
    <script>
        const pageAudio = window.GamePageUI.mount({ home: true, sound: true, muted: false });
        const DIFFICULTY = {
            easy:   { cols: 10, rows: 10, cellSize: 36 },
            medium: { cols: 15, rows: 15, cellSize: 28 },
            hard:   { cols: 20, rows: 20, cellSize: 22 }
        };

        let difficulty = 'easy';
        let maze = [];
        let player = { x: 0, y: 0 };
        let goal = { x: 0, y: 0 };
        let steps = 0;
        let timer = null;
        let seconds = 0;
        let gameActive = false;
        let pathHistory = [];

        const canvas = document.getElementById('maze');
        const ctx = canvas.getContext('2d');
        const timeDisplay = document.getElementById('timeDisplay');
        const stepsDisplay = document.getElementById('stepsDisplay');
        const victoryOverlay = document.getElementById('victory');

        function startTimer() {
            if (timer) return;
            seconds = 0;
            timer = setInterval(() => {
                seconds++;
                timeDisplay.textContent = formatTime(seconds);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
            timer = null;
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
        }

        function newMaze(diff) {
            difficulty = diff;
            document.querySelectorAll('.btn-diff').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.btn-diff.' + diff).classList.add('active');

            const config = DIFFICULTY[diff];

            // 生成迷宫
            maze = generateMaze(config.cols, config.rows);

            // 设置玩家和终点
            player = { x: 0, y: 0 };
            goal = { x: config.cols - 1, y: config.rows - 1 };
            steps = 0;
            pathHistory = [{ x: 0, y: 0 }];
            gameActive = true;

            // 设置画布尺寸
            canvas.width = config.cols * config.cellSize;
            canvas.height = config.rows * config.cellSize;

            stopTimer();
            timeDisplay.textContent = '00:00';
            stepsDisplay.textContent = '0';
            victoryOverlay.classList.remove('show');

            draw();
            startTimer();
            pageAudio.play('start');
        }

        function generateMaze(cols, rows) {
            // 初始化全墙
            const m = Array.from({length: rows}, () => Array(cols).fill(1));

            // DFS递归回溯生成迷宫
            const stack = [{x: 0, y: 0}];
            m[0][0] = 0;

            const directions = [
                {dx: 0, dy: -2}, // 上
                {dx: 2, dy: 0},  // 右
                {dx: 0, dy: 2},  // 下
                {dx: -2, dy: 0}  // 左
            ];

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const dirs = shuffle([...directions]);
                let found = false;

                for (const dir of dirs) {
                    const nx = current.x + dir.dx;
                    const ny = current.y + dir.dy;

                    if (nx > 0 && nx < cols - 1 && ny > 0 && ny < rows - 1 && m[ny][nx] === 1) {
                        m[ny][nx] = 0;
                        m[current.y + dir.dy / 2][current.x + dir.dx / 2] = 0;
                        stack.push({x: nx, y: ny});
                        found = true;
                        break;
                    }
                }

                if (!found) stack.pop();
            }

            // 确保起点和终点是通的
            m[0][0] = 0;
            m[rows - 1][cols - 1] = 0;

            return m;
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function draw() {
            const config = DIFFICULTY[difficulty];
            const cellSize = config.cellSize;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 画墙壁和路径
            for (let y = 0; y < maze.length; y++) {
                for (let x = 0; x < maze[y].length; x++) {
                    if (maze[y][x] === 1) {
                        // 墙壁
                        const gradient = ctx.createRadialGradient(
                            x * cellSize + cellSize * 0.3, y * cellSize + cellSize * 0.3, 0,
                            x * cellSize + cellSize * 0.5, y * cellSize + cellSize * 0.5, cellSize * 0.6
                        );
                        gradient.addColorStop(0, '#667eea');
                        gradient.addColorStop(1, '#4a5568');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);

                        // 墙壁高光
                        ctx.fillStyle = 'rgba(255,255,255,0.1)';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, 2);
                        ctx.fillRect(x * cellSize, y * cellSize, 2, cellSize);
                    } else {
                        // 路径
                        ctx.fillStyle = '#f8fafc';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                        ctx.strokeStyle = 'rgba(203, 213, 225, 0.5)';
                        ctx.lineWidth = 0.5;
                        ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }

            // 画路径历史
            for (let i = 0; i < pathHistory.length; i++) {
                const p = pathHistory[i];
                const alpha = 0.15 + (i / pathHistory.length) * 0.2;
                ctx.fillStyle = `rgba(78, 205, 196, ${alpha})`;
                ctx.beginPath();
                ctx.arc(
                    p.x * cellSize + cellSize * 0.5,
                    p.y * cellSize + cellSize * 0.5,
                    cellSize * 0.3, 0, Math.PI * 2
                );
                ctx.fill();
            }

            // 画终点
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath();
            ctx.arc(
                goal.x * cellSize + cellSize * 0.5,
                goal.y * cellSize + cellSize * 0.5,
                cellSize * 0.35, 0, Math.PI * 2
            );
            ctx.fill();

            // 终点光晕
            ctx.fillStyle = 'rgba(251, 191, 36, 0.3)';
            ctx.beginPath();
            ctx.arc(
                goal.x * cellSize + cellSize * 0.5,
                goal.y * cellSize + cellSize * 0.5,
                cellSize * 0.5, 0, Math.PI * 2
            );
            ctx.fill();

            // 画玩家
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(
                player.x * cellSize + cellSize * 0.5,
                player.y * cellSize + cellSize * 0.5,
                cellSize * 0.3, 0, Math.PI * 2
            );
            ctx.fill();

            // 玩家高光
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(
                player.x * cellSize + cellSize * 0.35,
                player.y * cellSize + cellSize * 0.35,
                cellSize * 0.12, 0, Math.PI * 2
            );
            ctx.fill();
        }

        function movePlayer(dx, dy) {
            if (!gameActive) return;

            const nx = player.x + dx;
            const ny = player.y + dy;

            if (nx >= 0 && nx < maze[0].length && ny >= 0 && ny < maze.length && maze[ny][nx] === 0) {
                player.x = nx;
                player.y = ny;
                steps++;
                pathHistory.push({ x: nx, y: ny });
                stepsDisplay.textContent = steps;
                draw();
                pageAudio.play('move');

                // 检查是否到达终点
                if (player.x === goal.x && player.y === goal.y) {
                    gameWon();
                }
            }
        }

        function gameWon() {
            gameActive = false;
            stopTimer();

            const config = DIFFICULTY[difficulty];
            const minSteps = config.cols + config.rows - 2; // 理论最小步数

            // 评分
            let stars = '★';
            if (steps <= minSteps * 1.5) stars = '★★★';
            else if (steps <= minSteps * 2.5) stars = '★★';

            document.getElementById('finalTime').textContent = formatTime(seconds);
            document.getElementById('finalSteps').textContent = steps;
            document.getElementById('finalScore').textContent = stars;

            victoryOverlay.classList.add('show');
            pageAudio.play('win');
        }

        function showHint() {
            if (!gameActive) return;
            const path = bfs(player.x, player.y, goal.x, goal.y);
            if (path && path.length > 1) {
                pageAudio.play('success');
                // 高亮前几步
                const config = DIFFICULTY[difficulty];
                for (let i = 1; i < Math.min(5, path.length); i++) {
                    const p = path[i];
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
                    ctx.beginPath();
                    ctx.arc(
                        p.x * config.cellSize + config.cellSize * 0.5,
                        p.y * config.cellSize + config.cellSize * 0.5,
                        config.cellSize * 0.25, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
                setTimeout(draw, 1500);
            }
        }

        function bfs(sx, sy, ex, ey) {
            const rows = maze.length;
            const cols = maze[0].length;
            const visited = Array.from({length: rows}, () => Array(cols).fill(false));
            const parent = new Map();
            const queue = [{x: sx, y: sy}];
            visited[sy][sx] = true;

            const dirs = [[0,-1], [1,0], [0,1], [-1,0]];

            while (queue.length > 0) {
                const cur = queue.shift();
                if (cur.x === ex && cur.y === ey) {
                    // 回溯路径
                    const path = [];
                    let key = `${ex},${ey}`;
                    while (key) {
                        const [x, y] = key.split(',').map(Number);
                        path.unshift({x, y});
                        key = parent.get(key);
                    }
                    return path;
                }

                for (const [dx, dy] of dirs) {
                    const nx = cur.x + dx;
                    const ny = cur.y + dy;
                    const key = `${nx},${ny}`;

                    if (nx >= 0 && nx < cols && ny >= 0 && ny < rows &&
                        maze[ny][nx] === 0 && !visited[ny][nx]) {
                        visited[ny][nx] = true;
                        parent.set(key, `${cur.x},${cur.y}`);
                        queue.push({x: nx, y: ny});
                    }
                }
            }
            return null;
        }

        function solveMaze() {
            if (!gameActive) return;
            const path = bfs(0, 0, goal.x, goal.y);
            if (path) {
                gameActive = false;
                stopTimer();
                pageAudio.play('success');
                // 画完整路径
                const config = DIFFICULTY[difficulty];
                for (let i = 0; i < path.length; i++) {
                    const p = path[i];
                    const alpha = 0.3 + (i / path.length) * 0.4;
                    ctx.fillStyle = `rgba(251, 191, 36, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(
                        p.x * config.cellSize + config.cellSize * 0.5,
                        p.y * config.cellSize + config.cellSize * 0.5,
                        config.cellSize * 0.35, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
                // 画玩家到终点
                ctx.fillStyle = '#ef4444';
                ctx.beginPath();
                ctx.arc(
                    goal.x * config.cellSize + config.cellSize * 0.5,
                    goal.y * config.cellSize + config.cellSize * 0.5,
                    config.cellSize * 0.3, 0, Math.PI * 2
                );
                ctx.fill();
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': e.preventDefault(); movePlayer(0, -1); break;
                case 'ArrowDown': case 's': case 'S': e.preventDefault(); movePlayer(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); movePlayer(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': e.preventDefault(); movePlayer(1, 0); break;
            }
        });

        // 触摸滑动
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                movePlayer(dx > 0 ? 1 : -1, 0);
            } else {
                movePlayer(0, dy > 0 ? 1 : -1);
            }
            touchStartX = 0;
            touchStartY = 0;
            e.preventDefault();
        }, { passive: false });

        // 初始化
        newMaze('easy');
    </script>
</body>
</html>
