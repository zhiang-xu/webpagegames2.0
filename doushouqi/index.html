<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dou Shou Qi</title>
  <style>
    :root{
      --cell: clamp(38px, 10.4vw, 82px);
      --board-w: calc(var(--cell) * 7);
      --board-h: calc(var(--cell) * 9);
      --paper:#e1d0a8;
      --paper-dark:#cdb988;
      --line:#312012;
      --grass1:#b8de78;
      --grass2:#7dbe48;
      --water1:#2ec9ff;
      --water2:#0d9fe4;
      --wood1:#f0ba74;
      --wood2:#c98033;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100dvh;
      font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.18), transparent 32%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.12), transparent 28%),
        linear-gradient(135deg,#7fc95e 0%,#4fa24f 52%,#2f7b3a 100%);
      color:#2f2618;
      padding:14px;
    }
    .shell{
      width:min(100%, 1080px);
      margin:0 auto;
      background:rgba(248,255,245,.92);
      border:1px solid rgba(221,243,214,.85);
      border-radius:26px;
      box-shadow:0 24px 60px rgba(0,0,0,.22);
      backdrop-filter:blur(12px);
      padding:18px;
      position:relative;
      overflow:hidden;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .icon-btn,.back-btn{
      width:50px;height:50px;border-radius:50%;
      display:grid;place-items:center;
      border:2px solid rgba(72,137,58,.45);
      background:rgba(255,255,255,.96);
      box-shadow:0 10px 20px rgba(0,0,0,.16);
      text-decoration:none;color:#3f8742;
      cursor:pointer; user-select:none;
      flex:0 0 auto;
    }
    .back-btn{font-size:24px}
    .icon-btn{font-size:22px}
    h1{
      margin:0;
      text-align:center;
      font-size:clamp(28px, 4vw, 42px);
      letter-spacing:.04em;
      flex:1;
    }
    .subtitle{
      text-align:center;
      margin:2px 0 14px;
      color:rgba(47,75,31,.82);
      font-size:.98rem;
    }
    .rules-box{
      margin:0 0 14px;
      padding:16px 18px;
      border-radius:18px;
      background:linear-gradient(180deg,rgba(245,255,240,.98),rgba(227,245,214,.98));
      border:1px solid rgba(114,179,86,.35);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 10px 24px rgba(63,112,46,.14);
    }
    .rules-box h2{
      margin:0 0 10px;
      font-size:1.05rem;
      color:#3b6f2d;
    }
    .rules-box ul{
      margin:0;
      padding-left:1.2rem;
      color:#405338;
      line-height:1.7;
    }
    .rules-box li + li{margin-top:6px}
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      align-items:end;
      margin-bottom:14px;
    }
    .group{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:128px;
    }
    .group label{
      font-size:.85rem;
      color:#5d4b2f;
      font-weight:700;
    }
    select,button{
      font:inherit;
      border-radius:14px;
      border:1px solid rgba(70,49,28,.14);
      background:#fff;
      padding:11px 14px;
      color:#2e2517;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }
    button{
      cursor:pointer;
      font-weight:800;
      color:#fff;
      border:none;
      transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }
    button:active{transform:scale(.98)}
    .btn-primary{background:linear-gradient(135deg,#82d36a,#5aa24a)}
    .btn-warm{background:linear-gradient(135deg,#7ec85d,#4b8f3f)}
    .btn-soft{background:linear-gradient(135deg,#9add80,#6cb857)}
    .btn-ghost{background:linear-gradient(135deg,#6cab4f,#437f38)}
    .meta{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-bottom:14px;
    }
    .card{
      padding:14px 16px;
      border-radius:18px;
      background:linear-gradient(180deg,rgba(251,255,248,.97),rgba(228,244,214,.98));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 10px 22px rgba(71,117,48,.1);
      text-align:center;
    }
    .card.current{
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 0 0 2px rgba(108,180,80,.3), 0 12px 26px rgba(71,117,48,.16);
    }
    .card h3{margin:0 0 6px;font-size:.9rem;color:#517041}
    .card .value{font-size:1.06rem;font-weight:800;color:#2f6d2c}
    .card.current.red .value,
    .card.current.blue .value{color:#2f6d2c}
    .board-wrap{
      display:flex;
      justify-content:center;
      overflow:auto;
      padding:8px 4px 12px;
      margin-bottom:10px;
    }
    .board{
      position:relative;
      width:var(--board-w);
      height:var(--board-h);
      border-radius:18px;
      border:2px solid rgba(59,38,16,.96);
      background:
        linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,0) 22%),
        linear-gradient(180deg, #d7c690 0%, #d2bf8a 100%);
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.12), 0 16px 38px rgba(55,36,18,.24);
      overflow:hidden;
      isolation:isolate;
    }
    .board::before{
      content:"";
      position:absolute;inset:8px;
      border-radius:13px;
      border:2px solid rgba(58,37,14,.88);
      pointer-events:none;
      z-index:0;
    }
    .board::after{
      content:"";
      position:absolute;
      left:10px;right:10px;top:calc(var(--cell) * 3);
      height:calc(var(--cell) * 3);
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.16) 0 2px, transparent 3px),
        radial-gradient(circle at 55% 65%, rgba(255,255,255,.12) 0 2px, transparent 3px),
        radial-gradient(circle at 82% 35%, rgba(255,255,255,.14) 0 2px, transparent 3px),
        linear-gradient(180deg, #4ad0ff 0%, #1ea7e2 52%, #0f93d5 100%);
      border-radius:14px;
      box-shadow:inset 0 10px 18px rgba(255,255,255,.08);
      z-index:1;
      pointer-events:none;
    }
    .grid,.decor{
      position:absolute;inset:0;
      z-index:2;
    }
    .decor{pointer-events:none; z-index:3; display:none}
    .grid{
      display:grid;
      grid-template-columns:repeat(7,var(--cell));
      grid-template-rows:repeat(9,var(--cell));
    }
    .cell{
      position:relative;
      cursor:pointer;
      touch-action:manipulation;
      border-right:1px solid rgba(49,32,18,.78);
      border-bottom:1px solid rgba(49,32,18,.78);
      transition:filter .15s ease, transform .15s ease, background .15s ease;
    }
    .cell:nth-child(7n){border-right:none}
    .cell:nth-last-child(-n+7){border-bottom:none}
    .cell:hover{filter:brightness(1.03)}
    .cell.selected{box-shadow:inset 0 0 0 3px rgba(255,214,80,.94)}
    .cell.valid-move::after,.cell.valid-capture::after{
      content:"";
      position:absolute;left:50%;top:50%;
      transform:translate(-50%,-50%);
      border-radius:50%;
      pointer-events:none;
    }
    .cell.valid-move::after{
      width:14px;height:14px;
      background:rgba(58,145,62,.9);
      box-shadow:0 0 0 4px rgba(255,255,255,.35);
    }
    .cell.valid-capture::after{
      width:20px;height:20px;
      background:radial-gradient(circle, rgba(255,255,255,.96) 0 5px, rgba(230,72,55,.96) 6px 100%);
      box-shadow:0 0 0 4px rgba(255,255,255,.35);
    }
    .land{
      background:
        radial-gradient(circle at 50% 46%, rgba(255,255,255,.12), transparent 24%),
        linear-gradient(135deg, var(--grass1) 0%, #a2cd5c 46%, var(--grass2) 100%);
    }
    .river{
      background:
        radial-gradient(circle at 25% 28%, rgba(255,255,255,.22) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 75% 64%, rgba(255,255,255,.18) 0 1.5px, transparent 2.5px),
        linear-gradient(180deg, var(--water1) 0%, var(--water2) 52%, #0f91d2 100%);
    }
    .river::before{
      content:"";
      position:absolute;inset:10px 8px;
      background:
        repeating-linear-gradient(180deg, rgba(255,255,255,.1) 0 2px, transparent 2px 24px);
      opacity:.35;
      pointer-events:none;
      border-radius:999px;
    }
    .bridge{
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.1) 0 2px, transparent 2px 16px),
        linear-gradient(180deg, var(--wood1) 0%, var(--wood2) 100%);
      box-shadow:inset 0 0 0 1px rgba(120,72,28,.24);
    }
    .bridge::before{
      content:"";
      position:absolute;inset:14% 10%;
      background:
        repeating-linear-gradient(180deg, rgba(120,72,28,.25) 0 2px, transparent 2px 18px);
      opacity:.45;
      border-radius:8px;
      pointer-events:none;
    }
    .trap,
    .den-blue,
    .den-red{
      position:relative;
      overflow:hidden;
    }
    .trap{
      background:
        radial-gradient(circle at 50% 50%, rgba(196,38,38,.28) 0 16%, transparent 17%),
        linear-gradient(135deg, #b9df73 0%, #8fcb57 100%);
    }
    .trap::before{
      content:"";
      position:absolute;
      inset:11% 12%;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,.28) 0 8%, transparent 9%),
        linear-gradient(180deg, #ff6b6b 0%, #e23a3a 72%, #b71f1f 100%);
      clip-path:polygon(50% 0%, 62% 14%, 78% 4%, 82% 21%, 98% 18%, 90% 33%, 100% 50%, 90% 67%, 98% 82%, 82% 79%, 78% 96%, 62% 86%, 50% 100%, 38% 86%, 22% 96%, 18% 79%, 2% 82%, 10% 67%, 0% 50%, 10% 33%, 2% 18%, 18% 21%, 22% 4%, 38% 14%);
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.22), 0 0 0 1px rgba(118,20,20,.32);
      opacity:.96;
      pointer-events:none;
    }
    .trap::after{
      content:"陷阱";
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:900;
      font-size:clamp(12px, 1.9vw, 17px);
      text-shadow:0 1px 2px rgba(108,12,12,.9);
      letter-spacing:.08em;
      pointer-events:none;
    }
    .den-blue,.den-red{
      background:
        radial-gradient(circle at 50% 58%, rgba(255,255,255,.34) 0 9%, transparent 10%),
        linear-gradient(135deg, #badf72 0%, #90ca57 100%);
    }
    .den-blue::before,
    .den-red::before{
      content:"";
      position:absolute;
      inset:15% 15% 22% 15%;
      border-radius:50%;
      background:radial-gradient(circle at 50% 40%, rgba(255,255,255,.15) 0 12%, transparent 13%), rgba(255,255,255,.08);
      box-shadow:inset 0 0 0 2px rgba(49,32,18,.55), inset 0 -10px 18px rgba(49,32,18,.12);
      pointer-events:none;
    }
    .den-blue::after,
    .den-red::after{
      content:"兽穴";
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:#7d1d1d;
      font-weight:900;
      font-size:clamp(12px, 1.85vw, 17px);
      text-shadow:0 1px 0 rgba(255,255,255,.4);
      pointer-events:none;
    }
    .piece{
      position:absolute;
      left:50%;top:50%;
      transform:translate(-50%,-50%);
      width:calc(var(--cell) * .78);
      height:calc(var(--cell) * .78);
      border-radius:50%;
      display:grid;
      place-items:center;
      gap:0;
      z-index:5;
      font-weight:800;
      border:3px solid rgba(255,255,255,.92);
      box-shadow:0 8px 18px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.35);
      user-select:none;
      cursor:default;
      padding:0;
      overflow:hidden;
    }
    .piece.red{
      color:#b81818;
      background:radial-gradient(circle at 30% 28%,#fff8da 0%,#ffe59b 48%,#f0c85a 100%);
      border-color:rgba(128,65,26,.85);
    }
    .piece.blue{
      color:#122d58;
      background:radial-gradient(circle at 30% 28%,#dff3c5 0%,#c3e49f 48%,#9ecb74 100%);
      border-color:rgba(24,73,19,.9);
    }
    .piece.selected{
      transform:translate(-50%,-50%) scale(1.06);
      box-shadow:0 0 0 4px rgba(255,214,80,.35), 0 10px 18px rgba(0,0,0,.22);
    }
    .piece .label{
      position:absolute;
      right:16%;
      top:14%;
      z-index:2;
      font-size:clamp(11px, 1.6vw, 16px);
      line-height:1;
      margin:0;
      padding:0 1px;
      text-shadow:0 1px 1px rgba(255,255,255,.58), 0 0 4px rgba(255,255,255,.38);
    }
    .piece .avatar{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:calc(var(--cell) * .76);
      height:calc(var(--cell) * .76);
      display:grid;
      place-items:center;
      border-radius:50%;
      background:radial-gradient(circle at 30% 28%, rgba(255,255,255,.14) 0 14%, rgba(255,255,255,0) 15%),
        rgba(255,255,255,.92);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.92), 0 2px 5px rgba(0,0,0,.12);
      border:1px solid rgba(255,255,255,.72);
      padding:4px;
    }
    .piece.blue .avatar{
      background:radial-gradient(circle at 30% 28%, rgba(255,255,255,.16) 0 14%, rgba(255,255,255,0) 15%),
        linear-gradient(180deg, #e8f7cf 0%, #d6efaf 48%, #bbdf8b 100%);
    }
    .piece.red .avatar{
      background:radial-gradient(circle at 30% 28%, rgba(255,255,255,.16) 0 14%, rgba(255,255,255,0) 15%),
        linear-gradient(180deg, #fff5cf 0%, #ffe99a 48%, #f5d56b 100%);
    }
    .piece .avatar svg{
      width:100%;
      height:100%;
      display:block;
      overflow:visible;
    }
    .piece .rank{display:none}
    .status{
      text-align:center;
      margin:4px 0 10px;
      min-height:1.5em;
      font-weight:800;
      color:#58472e;
    }
    .history{
      margin-top:12px;
      background:rgba(255,255,255,.8);
      border-radius:18px;
      padding:14px 16px;
    }
    .history h3{margin:0 0 8px;font-size:1rem}
    .history-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      max-height:160px;
      overflow:auto;
    }
    .history-item{
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.94);
      border:1px solid rgba(92,75,45,.14);
      font-size:.84rem;
    }
    .overlay{
      position:fixed;inset:0;
      background:rgba(12,10,8,.62);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:30;
      padding:18px;
    }
    .overlay.show{display:flex}
    .panel{
      width:min(100%, 380px);
      background:rgba(255,255,255,.97);
      border-radius:22px;
      padding:28px 24px;
      text-align:center;
      box-shadow:0 22px 48px rgba(0,0,0,.24);
    }
    .panel h2{margin:0 0 8px;font-size:2rem}
    .panel .winner{font-size:1.3rem;font-weight:800;margin-bottom:18px}
    .panel .winner.red{color:#d85a52}
    .panel .winner.blue{color:#3f7bd9}
    .muted{opacity:.72}
    @media (max-width: 720px){
      body{padding:8px}
      .shell{padding:12px;border-radius:20px}
      .topbar{gap:8px}
      .icon-btn,.back-btn{width:44px;height:44px}
      .controls{justify-content:stretch}
      .group{min-width:calc(50% - 6px);flex:1 1 calc(50% - 6px)}
      .controls button{flex:1 1 calc(50% - 6px)}
      .meta{grid-template-columns:1fr}
      .board-wrap{padding-inline:0}
      .history{padding:12px}
      .history-list{max-height:130px}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a href="../index.html" class="back-btn" id="backBtn" aria-label="返回主页">⌂</a>
      <h1 id="title"></h1>
      <button class="icon-btn muted" id="soundBtn" aria-label="音效开关">◌</button>
    </div>
    <div class="subtitle" id="subtitle"></div>

    <section class="rules-box" aria-label="游戏规则">
      <h2>玩法说明</h2>
      <ul>
        <li>目标是率先进入对方兽穴，或者把对方所有还能动的棋子都吃掉。</li>
        <li>大多数棋子按等级大小吃子，但老鼠可以吃大象，大象不能吃老鼠。</li>
        <li>狮子和老虎可以隔河跳跃，老鼠能下水，其他棋子不能进入河里。</li>
        <li>走进对方陷阱的棋子会变弱，所以进攻时要注意先手和站位。</li>
      </ul>
    </section>

    <div class="controls">
      <div class="group">
        <label for="modeSel" id="modeLabel"></label>
        <select id="modeSel"></select>
      </div>
      <div class="group" id="difficultyGroup">
        <label for="difficultySel" id="difficultyLabel"></label>
        <select id="difficultySel"></select>
      </div>
      <button class="btn-primary" id="newBtn" type="button"></button>
      <button class="btn-warm" id="undoBtn" type="button"></button>
      <button class="btn-soft" id="hintBtn" type="button"></button>
    </div>

    <div class="meta">
      <div class="card current red" id="redCard"><h3 id="redLabel"></h3><div class="value" id="redStatus"></div></div>
      <div class="card current blue" id="blueCard"><h3 id="blueLabel"></h3><div class="value" id="blueStatus"></div></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board" aria-label="斗兽棋棋盘">
        <div class="decor" id="decor"></div>
        <div class="grid" id="grid"></div>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="history">
      <h3 id="historyTitle"></h3>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="panel">
      <h2 id="overTitle"></h2>
      <div class="winner" id="winnerText"></div>
      <button class="btn-primary" id="againBtn" type="button"></button>
    </div>
  </div>

  <script>
    const ROWS = 9;
    const COLS = 7;
    const PIECES = {
      elephant: { name: '\u8c61', rank: 8, value: 800, avatar: 'elephant' },
      lion: { name: '\u72ee', rank: 7, value: 700, avatar: 'lion' },
      tiger: { name: '\u864e', rank: 6, value: 600, avatar: 'tiger' },
      leopard: { name: '\u8c79', rank: 5, value: 500, avatar: 'leopard' },
      wolf: { name: '\u72fc', rank: 4, value: 400, avatar: 'wolf' },
      dog: { name: '\u72d7', rank: 3, value: 300, avatar: 'dog' },
      cat: { name: '\u732b', rank: 2, value: 200, avatar: 'cat' },
      rat: { name: '\u9f20', rank: 1, value: 100, avatar: 'rat' }
    };

    const AVATARS = {
      elephant: `
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <g stroke="#4e3326" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="32" cy="34" r="20" fill="#9fd0e8"/>
            <ellipse cx="18" cy="31" rx="8" ry="11" fill="#c9ebf8"/>
            <ellipse cx="46" cy="31" rx="8" ry="11" fill="#c9ebf8"/>
            <circle cx="32" cy="35" r="14" fill="#dff5fb"/>
            <circle cx="27" cy="33" r="1.8" fill="#4e3326" stroke="none"/>
            <circle cx="37" cy="33" r="1.8" fill="#4e3326" stroke="none"/>
            <path d="M28 39c2 2 6 2 8 0" fill="none"/>
            <path d="M31 40c-1 4-2 7-1 10" fill="none"/>
            <path d="M34 40c1 4 2 7 1 10" fill="none"/>
            <path d="M30 52c2 1 3 1 4 0" fill="none"/>
            <circle cx="26" cy="41" r="2.1" fill="#ffcccf" stroke="none" opacity=".8"/>
            <circle cx="38" cy="41" r="2.1" fill="#ffcccf" stroke="none" opacity=".8"/>
          </g>
        </svg>`,
      lion: `
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <g stroke="#533018" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="32" cy="31" r="22" fill="#f59b2f"/>
            <circle cx="32" cy="34" r="14" fill="#ffe8bf"/>
            <path d="M18 19c3-6 9-9 14-8" fill="none"/>
            <path d="M46 19c-3-6-9-9-14-8" fill="none"/>
            <circle cx="27" cy="33" r="1.8" fill="#533018" stroke="none"/>
            <circle cx="37" cy="33" r="1.8" fill="#533018" stroke="none"/>
            <path d="M29 39c2 2 4 2 6 0" fill="none"/>
            <path d="M32 38v3" fill="none"/>
            <circle cx="24" cy="38" r="2.2" fill="#ffcf9f" stroke="none"/>
            <circle cx="40" cy="38" r="2.2" fill="#ffcf9f" stroke="none"/>
          </g>
        </svg>`,
      tiger: `
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <g stroke="#4d2e17" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="32" cy="33" r="19.5" fill="#ffa733"/>
            <path d="M21 20l4 6 7-7 7 7 4-6" fill="#ffba50"/>

    class SoundManager {
      constructor() {
        this.muted = true;
        this.ctx = null;
      }
      ensure() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
      toggle() {
        this.muted = !this.muted;
        return this.muted;
      }
      play(type) {
        if (this.muted) return;
        this.ensure();
        const map = { select: [420, .08], move: [300, .08], capture: [180, .14], win: [540, .25] };
        const [freq, dur] = map[type] || map.move;
        const t = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.connect(g);
        g.connect(this.ctx.destination);
        o.type = type === 'capture' ? 'sawtooth' : 'sine';
        o.frequency.value = freq;
        g.gain.setValueAtTime(.12, t);
        g.gain.exponentialRampToValueAtTime(.001, t + dur);
        o.start(t);
        o.stop(t + dur);
      }
    }

    class DouShouQiGame {
      constructor() {
        this.gridEl = document.getElementById('grid');
        this.decorEl = document.getElementById('decor');
        this.boardEl = document.getElementById('board');
        this.statusEl = document.getElementById('status');
        this.historyEl = document.getElementById('historyList');
        this.overlayEl = document.getElementById('overlay');
        this.winnerText = document.getElementById('winnerText');
        this.redStatus = document.getElementById('redStatus');
        this.blueStatus = document.getElementById('blueStatus');
        this.redCard = document.getElementById('redCard');
        this.blueCard = document.getElementById('blueCard');
        this.modeSel = document.getElementById('modeSel');
        this.difficultySel = document.getElementById('difficultySel');
        this.difficultyGroup = document.getElementById('difficultyGroup');
        this.soundBtn = document.getElementById('soundBtn');
        this.sound = new SoundManager();
        this.cells = [];
        this.mode = 'ai';
        this.difficulty = 'medium';
        this.currentPlayer = 'red';
        this.selected = null;
        this.validMoves = [];
        this.gameOver = false;
        this.turnToken = 0;
        this.history = [];
        this.pieces = [];
        this.terrain = [];
        this.setupText();
        this.buildGrid();
        this.bindEvents();
        this.init();
      }

      setupText() {
        document.title = TEXT.title;
        document.getElementById('title').textContent = TEXT.title;
        document.getElementById('subtitle').textContent = TEXT.subtitle;
        document.getElementById('modeLabel').textContent = TEXT.modeLabel;
        document.getElementById('difficultyLabel').textContent = TEXT.difficultyLabel;
        document.getElementById('newBtn').textContent = TEXT.newBtn;
        document.getElementById('undoBtn').textContent = TEXT.undoBtn;
        document.getElementById('hintBtn').textContent = TEXT.hintBtn;
        document.getElementById('redLabel').textContent = TEXT.redLabel;
        document.getElementById('blueLabel').textContent = TEXT.blueLabel;
        document.getElementById('historyTitle').textContent = TEXT.historyTitle;
        document.getElementById('overTitle').textContent = TEXT.overTitle;
        document.getElementById('againBtn').textContent = TEXT.againBtn;

        this.modeSel.innerHTML = '';
        [
          { value: 'pvp', label: TEXT.modePvp },
          { value: 'ai', label: TEXT.modeAi }
        ].forEach(({ value, label }) => {
          const opt = document.createElement('option');
          opt.value = value;
          opt.textContent = label;
          this.modeSel.appendChild(opt);
        });

        this.difficultySel.innerHTML = '';
        [
          { value: 'easy', label: TEXT.easy },
          { value: 'medium', label: TEXT.medium },
          { value: 'hard', label: TEXT.hard },
          { value: 'expert', label: TEXT.expert }
        ].forEach(({ value, label }) => {
          const opt = document.createElement('option');
          opt.value = value;
          opt.textContent = label;
          this.difficultySel.appendChild(opt);
        });
        this.modeSel.value = this.mode;
        this.difficultySel.value = this.difficulty;
      }

      bindEvents() {
        document.getElementById('newBtn').addEventListener('click', () => this.init());
        document.getElementById('undoBtn').addEventListener('click', () => this.undo());
        document.getElementById('hintBtn').addEventListener('click', () => this.toggleMode());
        document.getElementById('againBtn').addEventListener('click', () => this.init());
        this.modeSel.addEventListener('change', () => {
          this.mode = this.modeSel.value;
          this.difficultyGroup.style.display = this.mode === 'ai' ? '' : 'none';
          this.init();
        });
        this.difficultySel.addEventListener('change', () => {
          this.difficulty = this.difficultySel.value;
        });
        this.soundBtn.addEventListener('click', () => {
          const muted = this.sound.toggle();
          this.soundBtn.textContent = muted ? '◌' : '◉';
          this.soundBtn.classList.toggle('muted', muted);
        });
        window.addEventListener('resize', () => this.updateDecor());
      }

      init() {
        this.turnToken += 1;
        this.gameOver = false;
        this.currentPlayer = 'red';
        this.selected = null;
        this.validMoves = [];
        this.history = [];
        this.buildTerrain();
        this.buildPieces();
        this.buildDecor();
        this.overlayEl.classList.remove('show');
        this.render();
        this.updateStatus(TEXT.redTurnHint);
        this.difficultyGroup.style.display = this.mode === 'ai' ? '' : 'none';
        this.modeSel.value = this.mode;
        this.difficultySel.value = this.difficulty;
        this.updateTurnLabel();
      }

      buildGrid() {
        this.gridEl.innerHTML = '';
        this.cells = [];
        for (let r = 0; r < ROWS; r++) {
          this.cells[r] = [];
          for (let c = 0; c < COLS; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.row = String(r);
            cell.dataset.col = String(c);
            cell.addEventListener('click', () => this.handleCellClick(r, c));
            this.gridEl.appendChild(cell);
            this.cells[r][c] = cell;
          }
        }
      }

      buildDecor() {
        this.decorEl.innerHTML = '';
      }

      updateDecor() {
        if (this.gridEl.children.length) this.buildDecor();
        this.render();
      }

      buildTerrain() {
        this.terrain = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => 'land'));
        const bridgeCols = new Set([0, 3, 6]);
        for (let r = 3; r <= 5; r++) {
          for (let c = 0; c < COLS; c++) {
            this.terrain[r][c] = bridgeCols.has(c) ? 'bridge' : 'river';
          }
        }
        this.terrain[0][3] = 'den-blue';
        this.terrain[8][3] = 'den-red';
        [[0, 2], [0, 4], [1, 3]].forEach(([r, c]) => this.terrain[r][c] = 'trap');
        [[8, 2], [8, 4], [7, 3]].forEach(([r, c]) => this.terrain[r][c] = 'trap');
      }

      buildPieces() {
        const blue = [
          ['lion', 0, 0], ['tiger', 0, 6], ['wolf', 2, 4], ['leopard', 2, 2],
          ['rat', 2, 0], ['elephant', 2, 6], ['cat', 1, 5], ['dog', 1, 1]
        ];
        const red = [
          ['elephant', 6, 0], ['wolf', 6, 2], ['leopard', 6, 4], ['rat', 6, 6],
          ['cat', 7, 1], ['dog', 7, 5], ['tiger', 8, 0], ['lion', 8, 6]
        ];
        this.pieces = [...blue.map(([type, row, col], i) => this.makePiece('blue', type, row, col, i)),
          ...red.map(([type, row, col], i) => this.makePiece('red', type, row, col, i))];
      }

      makePiece(color, type, row, col, i) {
        return {
          id: `${color}-${type}-${i}`,
          color,
          type,
          row,
          col,
          alive: true
        };
      }

      cellSize() {
        return Math.max(32, Math.min(82, Math.round(this.boardEl.getBoundingClientRect().width / COLS)));
      }

      terrainAt(row, col) {
        return this.terrain[row]?.[col] || null;
      }

      isRiver(row, col) {
        return this.terrainAt(row, col) === 'river';
      }

      isBridge(row, col) {
        return this.terrainAt(row, col) === 'bridge';
      }

      isOwnDen(row, col, color) {
        return color === 'red' ? row === 8 && col === 3 : row === 0 && col === 3;
      }

      isEnemyDen(row, col, color) {
        return color === 'red' ? row === 0 && col === 3 : row === 8 && col === 3;
      }

      isEnemyTrap(row, col, color) {
        const traps = color === 'red'
          ? [[0, 2], [0, 4], [1, 3]]
          : [[8, 2], [8, 4], [7, 3]];
        return traps.some(([r, c]) => r === row && c === col);
      }

      inBounds(row, col) {
        return row >= 0 && row < ROWS && col >= 0 && col < COLS;
      }

      getPieceAt(row, col, state = this.pieces) {
        return state.find(p => p.alive && p.row === row && p.col === col) || null;
      }

      snapshot() {
        return this.pieces.map(p => ({ ...p }));
      }

      cloneState(state) {
        return state.map(p => ({ ...p }));
      }

      render() {
        this.renderCells();
        this.renderPieces();
        this.renderHighlights();
        this.updateUI();
      }

      renderCells() {
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const cell = this.cells[r][c];
            cell.className = `cell ${this.terrainAt(r, c)}`;
            if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) cell.classList.add('edge-node');
            if (this.selected && this.selected.row === r && this.selected.col === c) cell.classList.add('selected');
          }
        }
      }

      renderPieces() {
        this.gridEl.querySelectorAll('.piece').forEach(node => node.remove());
        for (const piece of this.pieces) {
          if (!piece.alive) continue;
          const cell = this.cells[piece.row]?.[piece.col];
          if (!cell) continue;
          const el = document.createElement('div');
          el.className = `piece ${piece.color}` + (this.selected && this.selected.id === piece.id ? ' selected' : '');
          const avatar = AVATARS[PIECES[piece.type].avatar] || '';
          el.innerHTML = `<span class="label">${PIECES[piece.type].name}</span><span class="avatar">${avatar}</span><span class="rank">${PIECES[piece.type].rank}</span>`;
          el.title = `${piece.color === 'red' ? TEXT.redSide : TEXT.blueSide} ${PIECES[piece.type].name}`;
          cell.appendChild(el);
        }
      }

      renderHighlights() {
        this.gridEl.querySelectorAll('.cell.valid-move,.cell.valid-capture').forEach(cell => cell.classList.remove('valid-move', 'valid-capture'));
        for (const move of this.validMoves) {
          const cell = this.cells[move.row]?.[move.col];
          if (cell) cell.classList.add(move.capture ? 'valid-capture' : 'valid-move');
        }
      }

      updateUI() {
        this.redCard.classList.toggle('current', this.currentPlayer === 'red');
        this.blueCard.classList.toggle('current', this.currentPlayer === 'blue');
        this.redStatus.textContent = this.currentPlayer === 'red' ? TEXT.turnRed : TEXT.waiting;
        this.blueStatus.textContent = this.currentPlayer === 'blue'
          ? (this.mode === 'ai' ? TEXT.turnBlueAi : TEXT.turnBlueHuman)
          : TEXT.waiting;
        document.getElementById('modeSel').value = this.mode;
        document.getElementById('difficultySel').value = this.difficulty;
      }

      updateTurnLabel() {
        if (this.mode === 'ai' && this.currentPlayer === 'blue') {
          this.updateStatus(TEXT.turnBlueAi);
        } else if (this.currentPlayer === 'red') {
          this.updateStatus(TEXT.redTurnHint);
        } else {
          this.updateStatus(TEXT.blueTurnHint);
        }
      }

      updateStatus(text) {
        this.statusEl.textContent = text;
      }

      setHistoryLabel(text) {
        this.historyEl.dataset.label = text;
      }

      handleCellClick(row, col) {
        if (this.gameOver) return;
        if (this.mode === 'ai' && this.currentPlayer === 'blue') return;

        const move = this.validMoves.find(m => m.row === row && m.col === col);
        if (move && this.selected) {
          this.performMove(this.selected.id, move);
          return;
        }

        const piece = this.getPieceAt(row, col);
        if (piece && piece.color === this.currentPlayer) {
          this.selectPiece(piece);
          return;
        }

        this.clearSelection();
      }

      selectPiece(piece) {
        this.sound.play('select');
        this.selected = piece;
        this.validMoves = this.getValidMoves(piece, this.pieces);
        this.render();
        this.updateStatus(TEXT.selectHint);
      }

      clearSelection() {
        this.selected = null;
        this.validMoves = [];
        this.render();
        this.updateTurnLabel();
      }

      canJump(piece, dir, state) {
        if (!['lion', 'tiger'].includes(piece.type)) return null;
        const nextRow = piece.row + dir.dr;
        const nextCol = piece.col + dir.dc;
        if (!this.inBounds(nextRow, nextCol) || !this.isRiver(nextRow, nextCol)) return null;
        let r = nextRow;
        let c = nextCol;
        while (this.inBounds(r, c) && this.isRiver(r, c)) {
          const blocker = this.getPieceAt(r, c, state);
          if (blocker && blocker.type === 'rat') return null;
          if (blocker) return null;
          r += dir.dr;
          c += dir.dc;
        }
        if (!this.inBounds(r, c) || this.isOwnDen(r, c, piece.color)) return null;
        return { row: r, col: c };
      }

      canCapture(attacker, defender, targetRow, targetCol) {
        if (this.isEnemyTrap(targetRow, targetCol, attacker.color)) return true;
        const attackerMeta = PIECES[attacker.type];
        const defenderMeta = PIECES[defender.type];
        if (attacker.type === 'rat' && defender.type === 'elephant') return true;
        if (attacker.type === 'elephant' && defender.type === 'rat') return false;
        if (this.terrainAt(attacker.row, attacker.col) === 'river' && this.terrainAt(targetRow, targetCol) === 'river') {
          return attacker.type === 'rat' && defender.type === 'rat';
        }
        const defenderRank = this.isEnemyTrap(targetRow, targetCol, attacker.color) ? 0 : defenderMeta.rank;
        return attackerMeta.rank >= defenderRank;
      }

      getValidMoves(piece, state = this.pieces) {
        const moves = [];
        const dirs = [
          { dr: -1, dc: 0 },
          { dr: 1, dc: 0 },
          { dr: 0, dc: -1 },
          { dr: 0, dc: 1 }
        ];
        for (const dir of dirs) {
          const nr = piece.row + dir.dr;
          const nc = piece.col + dir.dc;
          if (!this.inBounds(nr, nc)) continue;
          if (this.isOwnDen(nr, nc, piece.color)) continue;

          const jump = this.canJump(piece, dir, state);
          if (jump) {
            const target = this.getPieceAt(jump.row, jump.col, state);
            if (!target || target.color !== piece.color) {
              if (!target || this.canCapture(piece, target, jump.row, jump.col)) {
                moves.push({
                  row: jump.row,
                  col: jump.col,
                  capture: !!target,
                  jump: true,
                  targetId: target?.id || null
                });
              }
            }
            continue;
          }

          if (this.terrainAt(nr, nc) === 'river' && piece.type !== 'rat') continue;
          const target = this.getPieceAt(nr, nc, state);
          if (target && target.color === piece.color) continue;
          if (target) {
            if (this.canCapture(piece, target, nr, nc)) {
              moves.push({ row: nr, col: nc, capture: true, targetId: target.id });
            }
          } else {
            moves.push({ row: nr, col: nc, capture: false, targetId: null });
          }
        }
        return this.uniqueMoves(moves);
      }

      uniqueMoves(moves) {
        const seen = new Set();
        return moves.filter(m => {
          const key = `${m.row}-${m.col}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      getAllMoves(color, state) {
        const moves = [];
        for (const piece of state.filter(p => p.alive && p.color === color)) {
          const pieceMoves = this.getValidMoves(piece, state);
          for (const move of pieceMoves) {
            const target = this.getPieceAt(move.row, move.col, state);
            moves.push({
              ...move,
              pieceId: piece.id,
              piece: { ...piece },
              targetType: target?.type || null,
              win: this.isEnemyDen(move.row, move.col, color)
            });
          }
        }
        return moves;
      }

      applyMove(state, move) {
        const piece = state.find(p => p.id === move.pieceId && p.alive);
        if (!piece) return null;
        const target = state.find(p => p.alive && p.row === move.row && p.col === move.col);
        if (target) target.alive = false;
        piece.row = move.row;
        piece.col = move.col;
        return target ? { ...target } : null;
      }

      evaluateState(state, perspective) {
        let score = 0;
        const enemy = perspective === 'red' ? 'blue' : 'red';
        for (const piece of state) {
          if (!piece.alive) continue;
          const meta = PIECES[piece.type];
          const sign = piece.color === perspective ? 1 : -1;
          const advance = perspective === 'red' ? (ROWS - 1 - piece.row) : piece.row;
          score += sign * meta.value;
          score += sign * advance * 10;
          if (this.isEnemyTrap(piece.row, piece.col, piece.color)) score += sign * 60;
          if (this.terrainAt(piece.row, piece.col) === 'bridge') score += sign * 8;
          score += sign * this.mobility(piece, state) * 3;
        }
        const enemyMoves = this.getAllMoves(enemy, state);
        if (enemyMoves.some(m => m.win)) score -= 9000;
        score += (this.getAllMoves(perspective, state).length - enemyMoves.length) * 4;
        return score;
      }

      mobility(piece, state) {
        return this.getValidMoves(piece, state).length;
      }

      scoreMove(move, color, state) {
        const next = this.cloneState(state);
        const captured = this.applyMove(next, move);
        let score = this.evaluateState(next, color);
        if (captured) score += PIECES[captured.type].value * 1.15;
        if (move.win) score += 10000;
        if (this.isEnemyTrap(move.row, move.col, color)) score += 45;
        if (this.terrainAt(move.row, move.col) === 'bridge') score += 12;
        const progress = color === 'red' ? (ROWS - 1 - move.row) : move.row;
        score += progress * 2;
        return score;
      }

      searchBestMove(state, color, depth, alpha, beta, rootColor, limit) {
        const moves = this.getAllMoves(color, state);
        if (!moves.length || depth === 0) {
          return { score: this.evaluateState(state, rootColor), move: null };
        }

        const ordered = moves
          .map(move => ({ move, score: this.scoreMove(move, color, state) }))
          .sort((a, b) => b.score - a.score)
          .slice(0, limit)
          .map(item => item.move);

        const maximizing = color === rootColor;
        let bestMove = ordered[0] || null;
        let bestScore = maximizing ? -Infinity : Infinity;
        const nextColor = color === 'red' ? 'blue' : 'red';

        for (const move of ordered) {
          const next = this.cloneState(state);
          this.applyMove(next, move);
          const score = move.win
            ? (color === rootColor ? 100000 + depth * 100 : -100000 - depth * 100)
            : this.searchBestMove(next, nextColor, depth - 1, alpha, beta, rootColor, limit).score;

          if (maximizing) {
            if (score > bestScore) {
              bestScore = score;
              bestMove = move;
            }
            alpha = Math.max(alpha, bestScore);
          } else {
            if (score < bestScore) {
              bestScore = score;
              bestMove = move;
            }
            beta = Math.min(beta, bestScore);
          }

          if (alpha >= beta) break;
        }

        return { score: bestScore, move: bestMove };
      }

      chooseAiMove(color) {
        const state = this.snapshot();
        const moves = this.getAllMoves(color, state);
        if (!moves.length) return null;

        const winNow = moves.find(m => m.win);
        if (winNow) return winNow;

        const depthMap = { easy: 1, medium: 2, hard: 3, expert: 4 };
        const limitMap = { easy: 5, medium: 8, hard: 10, expert: 14 };
        const depth = depthMap[this.difficulty] || 2;
        const limit = limitMap[this.difficulty] || 8;
        const ordered = moves
          .map(move => ({ move, score: this.scoreMove(move, color, state) }))
          .sort((a, b) => b.score - a.score)
          .map(item => item.move);

        if (this.difficulty === 'easy') {
          const pool = ordered.slice(0, Math.min(4, ordered.length));
          return pool[Math.floor(Math.random() * pool.length)] || ordered[0];
        }

        const best = this.searchBestMove(state, color, depth, -Infinity, Infinity, color, limit);
        if (best.move) return best.move;
        return ordered[0];
      }

      performMove(pieceId, move) {
        const piece = this.pieces.find(p => p.id === pieceId && p.alive);
        if (!piece || this.gameOver) return;
        const target = this.getPieceAt(move.row, move.col);
        const captured = target ? { ...target } : null;

        this.history.push({
          pieceId,
          from: { row: piece.row, col: piece.col },
          to: { row: move.row, col: move.col },
          captured,
          prevTurn: this.currentPlayer
        });

        if (target) target.alive = false;
        piece.row = move.row;
        piece.col = move.col;
        this.sound.play(target ? 'capture' : 'move');

        if (this.isEnemyDen(move.row, move.col, piece.color)) {
          this.finishGame(piece.color);
          return;
        }

        const opponentAlive = this.pieces.some(p => p.alive && p.color !== piece.color);
        if (!opponentAlive) {
          this.finishGame(piece.color);
          return;
        }

        this.selected = null;
        this.validMoves = [];
        this.currentPlayer = this.currentPlayer === 'red' ? 'blue' : 'red';
        this.render();
        this.appendHistory(piece, move, target);
        this.updateTurnLabel();

        if (this.mode === 'ai' && this.currentPlayer === 'blue' && !this.gameOver) {
          this.scheduleAiMove();
        }
      }

      appendHistory(piece, move, target) {
        const item = document.createElement('div');
        item.className = 'history-item';
        const side = piece.color === 'red' ? TEXT.redSide : TEXT.blueSide;
        const captureText = target ? ` \u2192 ${PIECES[target.type].name}` : '';
        item.textContent = `${side} ${PIECES[piece.type].name} (${move.row + 1},${move.col + 1})${captureText}`;
        this.historyEl.prepend(item);
      }

      finishGame(winnerColor) {
        this.gameOver = true;
        this.selected = null;
        this.validMoves = [];
        this.render();
        this.winnerText.textContent = winnerColor === 'red' ? TEXT.redWin : TEXT.blueWin;
        this.winnerText.className = `winner ${winnerColor}`;
        this.overlayEl.classList.add('show');
        this.sound.play('win');
        this.updateStatus(winnerColor === 'red' ? TEXT.redWin : TEXT.blueWin);
      }

      undo() {
        if (!this.history.length || this.gameOver) {
          if (this.gameOver) return;
          return;
        }
        const steps = this.mode === 'ai' ? 2 : 1;
        for (let i = 0; i < steps && this.history.length; i++) {
          const step = this.history.pop();
          const piece = this.pieces.find(p => p.id === step.pieceId);
          if (piece) {
            piece.row = step.from.row;
            piece.col = step.from.col;
            piece.alive = true;
          }
          if (step.captured) {
            const restored = this.pieces.find(p => p.id === step.captured.id);
            if (restored) restored.alive = true;
          }
          this.currentPlayer = step.prevTurn;
        }
        this.gameOver = false;
        this.selected = null;
        this.validMoves = [];
        this.overlayEl.classList.remove('show');
        this.render();
        this.updateTurnLabel();
      }

      toggleMode() {
        this.mode = this.mode === 'ai' ? 'pvp' : 'ai';
        this.init();
      }

      scheduleAiMove() {
        const token = this.turnToken;
        setTimeout(() => {
          if (this.gameOver || token !== this.turnToken || this.currentPlayer !== 'blue') return;
          const move = this.chooseAiMove('blue');
          if (move) {
            this.performMove(move.pieceId, move);
          } else {
            this.currentPlayer = 'red';
            this.render();
            this.updateStatus(TEXT.blueStall);
            this.updateTurnLabel();
          }
        }, 260);
      }
    }

    const game = new DouShouQiGame();
    document.getElementById('soundBtn').textContent = '◌';
  </script>
</body>
