<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 猜数字 - 张七七的游戏乐园</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Comic Neue', 'Noto Sans SC', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .floating-decorations {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .floating-item {
            position: absolute;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
            opacity: 0.3;
        }
        .floating-item:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .floating-item:nth-child(2) { top: 20%; right: 10%; animation-delay: 1s; }
        .floating-item:nth-child(3) { bottom: 30%; left: 15%; animation-delay: 2s; }
        .floating-item:nth-child(4) { bottom: 15%; right: 5%; animation-delay: 3s; }
        .floating-item:nth-child(5) { top: 50%; left: 85%; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        header {
            text-align: center;
            padding: 20px 20px 10px;
            position: relative;
            z-index: 1;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 3px 3px 0 #ff6b6b, 6px 6px 0 #4ecdc4;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.85);
            margin-top: 5px;
        }

        .rules-box {
            position: relative;
            z-index: 1;
            width: min(100%, 760px);
            margin: 0 20px 18px;
            padding: 16px 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.94);
            border: 2px dashed rgba(78,205,196,0.55);
            box-shadow: 0 10px 28px rgba(0,0,0,0.18);
            text-align: left;
        }
        .rules-box h2 {
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #2f6f55;
        }
        .rules-box ul {
            margin: 0;
            padding-left: 1.2rem;
            color: #4c4c4c;
            line-height: 1.7;
        }
        .rules-box li + li {
            margin-top: 6px;
        }

        .game-area {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
        }

        .info-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-box {
            background: rgba(255,255,255,0.95);
            border-radius: 18px;
            padding: 18px 24px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            min-width: 130px;
        }
        .info-box h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 4px;
        }
        .info-box .value {
            font-size: 2rem;
            font-weight: 700;
        }
        .info-box .value.attempts { color: #ff6b6b; }
        .info-box .value.best { color: #4ecdc4; }

        .difficulty-select {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-diff {
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-diff.easy { background: linear-gradient(135deg, #4ecdc4, #44a3aa); color: white; }
        .btn-diff.medium { background: linear-gradient(135deg, #ffa751, #ffe259); color: #333; }
        .btn-diff.hard { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; }
        .btn-diff.active {
            outline: 3px solid white;
            outline-offset: 3px;
        }

        .game-box {
            background: rgba(255,255,255,0.98);
            border-radius: 25px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
        }

        .range-display {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 20px;
        }

        .hint-box {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hint-box .hint-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2e7d32;
        }
        .hint-box .hint-text.wrong {
            background: linear-gradient(135deg, #fce4ec, #f8bbd9);
            color: #c62828;
        }

        .guess-input {
            width: 150px;
            padding: 15px;
            font-size: 2.5rem;
            font-family: inherit;
            font-weight: 700;
            text-align: center;
            border: 3px solid #ddd;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s;
            background: #fafafa;
            margin-bottom: 15px;
        }
        .guess-input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 0 4px rgba(78, 205, 196, 0.2);
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 18px rgba(0,0,0,0.25);
        }
        .btn-guess {
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
            color: white;
            width: 100%;
            max-width: 200px;
        }
        .btn-guess:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.5);
        }
        .btn-guess:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-new {
            background: linear-gradient(135deg, #ffa751, #ffe259);
            color: #333;
            margin-top: 15px;
        }
        .btn-new:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 167, 81, 0.5);
        }

        /* 数字键盘 */
        .number-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 350px;
        }

        .num-btn {
            padding: 15px 0;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            color: #333;
            background: rgba(255,255,255,0.9);
        }
        .num-btn:hover { transform: translateY(-2px); }
        .num-btn:active { transform: scale(0.95); }
        .num-btn.clear { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; }
        .num-btn.submit { background: linear-gradient(135deg, #4ecdc4, #44a3aa); color: white; }

        /* 猜过的数字 */
        .guesses-history {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .guess-tag {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 700;
            background: #e8eaf6;
            color: #3f51b5;
        }

        /* 胜利遮罩 */
        .victory-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .victory-overlay.show { display: flex; }
        .victory-overlay h2 {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #333;
        }
        .victory-overlay .stats {
            color: #fff;
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 25px;
        }
        .victory-overlay .stats p { margin: 8px 0; }
        .victory-overlay .btn-play-again {
            padding: 18px 48px;
            border: none;
            border-radius: 35px;
            font-size: 1.4rem;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
            color: white;
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.5);
            transition: all 0.3s;
        }
        .victory-overlay .btn-play-again:hover { transform: scale(1.05); }

        /* 移动端 */
        @media (max-width: 768px) {
            .logo { font-size: 1.8rem; }
            .game-box { padding: 20px 25px; }
            .guess-input { font-size: 2rem; width: 120px; }
            .hint-box .hint-text { font-size: 1.4rem; }
            .info-box { padding: 12px 16px; min-width: 100px; }
            .info-box .value { font-size: 1.6rem; }
            .number-pad { gap: 6px; }
            .num-btn { padding: 12px 0; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="floating-decorations">
        <span class="floating-item">🔢</span>
        <span class="floating-item">🎯</span>
        <span class="floating-item">⭐</span>
        <span class="floating-item">🌟</span>
        <span class="floating-item">💫</span>
    </div>

    <header>
        <div class="logo">🔢 猜数字</div>
        <p class="subtitle">张七七的游戏乐园 | 猜出1到N之间的神秘数字！</p>
    </header>

    <section class="rules-box" aria-label="游戏规则">
        <h2>玩法说明</h2>
        <ul>
            <li>先选择难度，系统会在对应范围里悄悄选出一个数字。</li>
            <li>输入你的猜测后，页面会提示“太大了”还是“太小了”。</li>
            <li>根据提示不断缩小范围，直到猜中目标数字。</li>
            <li>猜中的次数越少，分数通常越高。</li>
        </ul>
    </section>

    <div class="game-area">
        <div class="difficulty-select">
            <button class="btn-diff easy active" onclick="newGame('easy')">简单 (1-50)</button>
            <button class="btn-diff medium" onclick="newGame('medium')">中等 (1-100)</button>
            <button class="btn-diff hard" onclick="newGame('hard')">困难 (1-200)</button>
        </div>

        <div class="info-bar">
            <div class="info-box">
                <h3>🔄 已猜</h3>
                <p class="value attempts" id="attemptsDisplay">0</p>
            </div>
            <div class="info-box">
                <h3>🥇 最佳</h3>
                <p class="value best" id="bestDisplay">—</p>
            </div>
        </div>

        <div class="game-box">
            <p class="range-display">范围：<span id="rangeDisplay">1 ~ 50</span></p>
            <div class="hint-box">
                <p class="hint-text" id="hintText">开始猜吧！</p>
            </div>
            <input type="number" class="guess-input" id="guessInput" placeholder="?" min="1" max="200">
            <button class="btn btn-guess" id="guessBtn" onclick="makeGuess()">🎯 猜一下</button>
            <div class="guesses-history" id="guessesHistory"></div>
            <button class="btn btn-new" onclick="newGame(difficulty)">🔄 新游戏</button>
        </div>

        <div class="number-pad" id="numberPad"></div>
    </div>

    <div class="victory-overlay" id="victory">
        <h2>🎉 恭喜你猜对了！</h2>
        <div class="stats">
            <p>🎯 目标数字：<span id="targetNumber" style="color:#ffd700;font-weight:700;font-size:1.5rem;">—</span></p>
            <p>🔄 猜了：<span id="finalAttempts">—</span> 次</p>
            <p>⭐ 评分：<span id="finalScore">★★★</span></p>
        </div>
        <button class="btn-play-again" onclick="newGame(difficulty)">🎮 再玩一次</button>
    </div>

    <script src="../shared/game-ui.js"></script>
    <script>
        const pageAudio = window.GamePageUI.mount({ home: true, sound: true, muted: false });
        const DIFFICULTY = {
            easy:   { max: 50,  name: '简单',  bestLabel: '1-50' },
            medium: { max: 100, name: '中等',  bestLabel: '1-100' },
            hard:   { max: 200, name: '困难',  bestLabel: '1-200' }
        };

        let difficulty = 'easy';
        let targetNumber = 0;
        let attempts = 0;
        let gameActive = false;
        let bestScores = JSON.parse(localStorage.getItem('guessNumberBest') || '{}');

        const attemptsEl = document.getElementById('attemptsDisplay');
        const bestEl = document.getElementById('bestDisplay');
        const rangeEl = document.getElementById('rangeDisplay');
        const hintEl = document.getElementById('hintText');
        const inputEl = document.getElementById('guessInput');
        const guessBtn = document.getElementById('guessBtn');
        const historyEl = document.getElementById('guessesHistory');
        const victoryOverlay = document.getElementById('victory');
        const numberPad = document.getElementById('numberPad');

        function updateBestDisplay() {
            const key = DIFFICULTY[difficulty].bestLabel;
            if (bestScores[key] !== undefined) {
                bestEl.textContent = bestScores[key];
            } else {
                bestEl.textContent = '—';
            }
        }

        function renderNumberPad() {
            numberPad.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.textContent = i;
                btn.addEventListener('click', () => appendNumber(i));
                numberPad.appendChild(btn);
            }
            // 0
            const btn0 = document.createElement('button');
            btn0.className = 'num-btn';
            btn0.textContent = '0';
            btn0.addEventListener('click', () => appendNumber(0));
            numberPad.appendChild(btn0);
            // 清除
            const clearBtn = document.createElement('button');
            clearBtn.className = 'num-btn clear';
            clearBtn.textContent = '⌫';
            clearBtn.addEventListener('click', () => {
                inputEl.value = inputEl.value.slice(0, -1);
                inputEl.focus();
                pageAudio.play('tap');
            });
            numberPad.appendChild(clearBtn);
            // 提交
            const submitBtn = document.createElement('button');
            submitBtn.className = 'num-btn submit';
            submitBtn.textContent = '✅';
            submitBtn.addEventListener('click', makeGuess);
            numberPad.appendChild(submitBtn);
        }

        function appendNumber(num) {
            if (!gameActive) return;
            inputEl.value += num;
            inputEl.focus();
            pageAudio.play('tap');
        }

        function newGame(diff) {
            difficulty = diff;
            document.querySelectorAll('.btn-diff').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.btn-diff.' + diff).classList.add('active');

            targetNumber = Math.floor(Math.random() * DIFFICULTY[diff].max) + 1;
            attempts = 0;
            gameActive = true;

            rangeEl.textContent = `1 ~ ${DIFFICULTY[diff].max}`;
            hintEl.textContent = '开始猜吧！';
            hintEl.className = 'hint-text';
            inputEl.value = '';
            inputEl.disabled = false;
            guessBtn.disabled = false;
            historyEl.innerHTML = '';
            victoryOverlay.classList.remove('show');
            updateBestDisplay();
            updateAttempts();
            pageAudio.play('start');

            inputEl.focus();
        }

        function updateAttempts() {
            attemptsEl.textContent = attempts;
        }

        function addHistory(num) {
            const tag = document.createElement('span');
            tag.className = 'guess-tag';
            tag.textContent = num;
            historyEl.appendChild(tag);
            historyEl.scrollTop = historyEl.scrollHeight;
        }

        function makeGuess() {
            if (!gameActive) return;

            const guess = parseInt(inputEl.value);
            if (isNaN(guess) || guess < 1 || guess > DIFFICULTY[difficulty].max) {
                hintEl.textContent = '请输入 ' + DIFFICULTY[difficulty].max + ' 以内的数字！';
                hintEl.className = 'hint-text wrong';
                pageAudio.play('error');
                return;
            }

            attempts++;
            updateAttempts();
            addHistory(guess);

            if (guess === targetNumber) {
                gameWon();
            } else if (guess < targetNumber) {
                hintEl.textContent = '📈 太小了！再大一点～';
                hintEl.className = 'hint-text';
                inputEl.value = '';
                inputEl.focus();
                pageAudio.play('move');
            } else {
                hintEl.textContent = '📉 太大了！再小一点～';
                hintEl.className = 'hint-text';
                inputEl.value = '';
                inputEl.focus();
                pageAudio.play('move');
            }
        }

        function gameWon() {
            gameActive = false;
            inputEl.disabled = true;
            guessBtn.disabled = true;

            // 保存最佳成绩
            const key = DIFFICULTY[difficulty].bestLabel;
            if (bestScores[key] === undefined || attempts < bestScores[key]) {
                bestScores[key] = attempts;
                localStorage.setItem('guessNumberBest', JSON.stringify(bestScores));
            }

            // 评分
            const max = DIFFICULTY[difficulty].max;
            const ideal = Math.ceil(Math.log2(max)); // 二分法最优次数
            let stars = '★';
            if (attempts <= ideal + 2) stars = '★★★';
            else if (attempts <= ideal + 5) stars = '★★';

            document.getElementById('targetNumber').textContent = targetNumber;
            document.getElementById('finalAttempts').textContent = attempts;
            document.getElementById('finalScore').textContent = stars;

            victoryOverlay.classList.add('show');
            pageAudio.play('win');
        }

        // 回车提交
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') makeGuess();
        });

        // 初始化
        renderNumberPad();
        newGame('easy');
    </script>
</body>
</html>
